name: Bug report
description: Report broken setup, CLI behavior, MCP behavior, or delegated task execution.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please include enough context to reproduce the behavior.
  - type: input
    id: version
    attributes:
      label: Cofounder version
      description: Output from `cofounder --version` if available, or the npm package version.
      placeholder: "0.1.12"
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, npm version, and Codex CLI version.
      placeholder: "macOS 15, Node 22.x, npm 10.x, Codex ..."
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Commands, prompt, or minimal repo state that triggers the bug.
      placeholder: |
        1. Run `cofounder start --setup-codex`
        2. Open Codex
        3. Ask ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead? Include relevant logs or errors.
    validations:
      required: true
  - type: textarea
    id: extra
    attributes:
      label: Extra context
      description: Add task IDs, `.cofounder/runs/.../events.jsonl` excerpts, or screenshots if useful.
    validations:
      required: false
