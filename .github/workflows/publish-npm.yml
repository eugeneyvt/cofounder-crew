name: Publish npm

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Validate release version
        run: |
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";

          const root = JSON.parse(readFileSync("package.json", "utf8"));
          const create = JSON.parse(readFileSync("packages/create-cofounder/package.json", "utf8"));
          const tag = process.env.GITHUB_REF_NAME;
          const expectedTag = `v${root.version}`;

          if (create.version !== root.version) {
            throw new Error(`Package versions differ: cofounder-crew@${root.version}, create-cofounder@${create.version}`);
          }

          if (tag !== expectedTag) {
            throw new Error(`Release tag ${tag} must match package version ${expectedTag}`);
          }
          NODE

      - name: Verify versions are unpublished
        run: |
          version="$(node -p "JSON.parse(require('fs').readFileSync('package.json', 'utf8')).version")"

          if npm view "cofounder-crew@$version" version >/dev/null 2>&1; then
            echo "cofounder-crew@$version is already published"
            exit 1
          fi

          if npm view "create-cofounder@$version" version >/dev/null 2>&1; then
            echo "create-cofounder@$version is already published"
            exit 1
          fi

      - name: Typecheck
        run: npm run check

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Publish runtime package
        run: npm publish --access public

      - name: Publish initializer package
        run: npm publish -w create-cofounder --access public
